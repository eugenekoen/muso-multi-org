<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.75" />
    <link rel="shortcut icon" href="./../../style/images/LOGO.svg" />
    <link rel="stylesheet" type="text/css" href="./../../style/song.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,400i,500,500i,600" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="text/javascript" src="../jquery/jquery.min.js"></script>
    <script type="text/javascript" src="../jquery/jquery.transposer.js"></script>
    <title>Song</title>
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator)
        {
            window.addEventListener('load', () =>
            {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</head>

<body>
    <pre id="songContent">
    <!-- Content will be injected here by script -->
  </pre>

    <!-- Space-saving Floating Action Button (FAB) Toggle -->
    <button id="song-fab-toggle" class="floating-toggle" style="display: none;" onclick="toggleContentType()" title="Toggle Chords/Lyrics">
        <i class="fa-solid fa-align-left"></i>
    </button>

    <script>
        // Updated credentials to match supabaseClient.js
        const SUPABASE_URL = 'https://xikllcuwvyuqcvcjjimw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpa2xsY3V3dnl1cWN2Y2pqaW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NjkyMTYsImV4cCI6MjA4NDQ0NTIxNn0.DqAsJ2BXAzwnggId0nMihzfxN9UpslAUQzm-V5sgfWY';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const OFFLINE_CACHE_TTL_MS = 4 * 60 * 60 * 1000;

        // Dynamic State
        let activeSongData = {
            songIdentifier: '',
            displayName: '',
            chordsContent: '',
            lyricsContent: '',
            orgId: '',
            targetKey: ''
        };
        let currentContentType = 'chords';

        function getSongCacheKey(orgId, songIdentifier)
        {
            return `cachedSong_${orgId}_${songIdentifier}`;
        }

        function readSongCache(orgId, songIdentifier)
        {
            if (!orgId || !songIdentifier) return null;
            const cacheKey = getSongCacheKey(orgId, songIdentifier);
            const cachedData = localStorage.getItem(cacheKey);
            if (!cachedData) return null;
            try
            {
                return JSON.parse(cachedData);
            } catch (e)
            {
                console.warn('Invalid cached song data', e);
                return null;
            }
        }

        function renderSongContent(preElement, songContent, contentType, displayName, targetKey)
        {
            document.title = displayName || 'Song';

            // Clean up any previously injected transposer key bars
            $('.transpose-keys').remove();

            let lines = songContent.split('\n');

            let key = 'C';
            let contentStartIndex = 0;

            for (let i = 0; i < lines.length; i++)
            {
                const trimmedLine = lines[i].trim();
                if (trimmedLine !== '')
                {
                    if (/^[A-G][b#]?m?$/.test(trimmedLine))
                    {
                        key = trimmedLine;
                        contentStartIndex = i + 1;
                    } else
                    {
                        contentStartIndex = i;
                    }
                    break;
                }
            }

            preElement.textContent = lines.slice(contentStartIndex).join('\n');

            const finalKey = key;
            preElement.setAttribute('data-key', finalKey);

            if (contentType === 'chords')
            {
                $('#songContent').transpose();

                if (targetKey && targetKey !== key)
                {
                    const transposeLinks = document.querySelectorAll('.transpose-keys a');
                    for (let link of transposeLinks)
                    {
                        if (link.textContent.trim() === targetKey)
                        {
                            link.click();
                            break;
                        }
                    }
                }
            }
        }

        function renderCurrentContent()
        {
            const preElement = document.getElementById('songContent');
            const songContent = currentContentType === 'chords' ? activeSongData.chordsContent : activeSongData.lyricsContent;

            if (!songContent)
            {
                preElement.textContent = `Error: No ${currentContentType} content available for this song.`;
                const fabButton = document.getElementById('song-fab-toggle');
                if (fabButton) fabButton.style.display = 'none';
                return;
            }

            renderSongContent(preElement, songContent, currentContentType, activeSongData.displayName, activeSongData.targetKey);

            // Update floating toggle FAB
            const fabButton = document.getElementById('song-fab-toggle');
            if (fabButton)
            {
                // Only show toggle FAB if both types are available in the data
                if (activeSongData.chordsContent && activeSongData.lyricsContent)
                {
                    fabButton.style.display = 'flex';
                } else
                {
                    fabButton.style.display = 'none';
                }

                if (currentContentType === 'chords')
                {
                    fabButton.innerHTML = '<i class="fa-solid fa-align-left"></i>';
                    fabButton.title = 'Switch to Lyrics';
                } else
                {
                    fabButton.innerHTML = '<i class="fa-solid fa-music"></i>';
                    fabButton.title = 'Switch to Chords';
                }
            }
        }

        function toggleContentType()
        {
            currentContentType = currentContentType === 'chords' ? 'lyrics' : 'chords';
            renderCurrentContent();
        }

        // Listen for transposer clicks to keep track of the selected transposition key
        $(document).on('click', '.transpose-keys a', function()
        {
            activeSongData.targetKey = $(this).text().trim();
        });

        document.addEventListener('DOMContentLoaded', async function ()
        {
            // Load and apply theme from preferences
            let songTheme = localStorage.getItem('muso-song-theme') || 'auto';
            if (songTheme === 'auto')
            {
                songTheme = localStorage.getItem('muso-theme') || 'light';
            }
            if (songTheme && songTheme !== 'light')
            {
                document.body.classList.add(`theme-${songTheme}`);
            }

            const preElement = document.getElementById('songContent');
            preElement.textContent = "Loading song...";

            const params = new URLSearchParams(window.location.search);
            const songIdentifier = params.get('song');
            const contentType = params.get('contentType') || 'chords';
            const orgId = params.get('org');
            const targetKey = params.get('targetKey');

            if (!songIdentifier)
            {
                console.error("Missing song identifier in the URL.");
                preElement.textContent = "Error: Song not specified in the URL.";
                return;
            }

            currentContentType = contentType;

            const cachedEntry = readSongCache(orgId, songIdentifier);
            const cacheIsFresh = !!(cachedEntry && cachedEntry.expiresAt && cachedEntry.expiresAt > Date.now());

            if (cacheIsFresh && cachedEntry)
            {
                activeSongData.songIdentifier = songIdentifier;
                activeSongData.displayName = cachedEntry.displayName;
                activeSongData.chordsContent = cachedEntry.chordsContent || '';
                activeSongData.lyricsContent = cachedEntry.lyricsContent || '';
                activeSongData.orgId = orgId;
                activeSongData.targetKey = targetKey;

                renderCurrentContent();
                return;
            }

            try
            {
                await supabaseClient.auth.getSession();

                const { data, error } = await supabaseClient
                    .from('songs')
                    .select('chords_content, lyrics_content, display_name')
                    .eq('song_identifier', songIdentifier)
                    .eq('organization_id', orgId)
                    .maybeSingle();

                if (error) throw error;

                if (!data)
                {
                    preElement.textContent = `Error: Could not find song '${songIdentifier}'.`;
                    return;
                }

                const displayName = data.display_name || 'Song';
                const chordsContent = data.chords_content || '';
                const lyricsContent = data.lyrics_content || '';

                // Save both to offline cache in a single write
                const now = Date.now();
                const cachePayload = {
                    songIdentifier: songIdentifier,
                    displayName: displayName,
                    chordsContent: chordsContent,
                    lyricsContent: lyricsContent,
                    cachedAt: now,
                    expiresAt: now + OFFLINE_CACHE_TTL_MS
                };
                localStorage.setItem(getSongCacheKey(orgId, songIdentifier), JSON.stringify(cachePayload));

                activeSongData.songIdentifier = songIdentifier;
                activeSongData.displayName = displayName;
                activeSongData.chordsContent = chordsContent;
                activeSongData.lyricsContent = lyricsContent;
                activeSongData.orgId = orgId;
                activeSongData.targetKey = targetKey;

                renderCurrentContent();

            } catch (err)
            {
                console.error('Error fetching song content:', err);
                if (cachedEntry)
                {
                    activeSongData.songIdentifier = songIdentifier;
                    activeSongData.displayName = cachedEntry.displayName;
                    activeSongData.chordsContent = cachedEntry.chordsContent || '';
                    activeSongData.lyricsContent = cachedEntry.lyricsContent || '';
                    activeSongData.orgId = orgId;
                    activeSongData.targetKey = targetKey;

                    renderCurrentContent();
                } else
                {
                    preElement.textContent = 'Error: Failed to load song data. Please check your connection.';
                }
            }
        });
    </script>
</body>
</html>
